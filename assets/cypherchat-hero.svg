<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA">
        <animate attributeName="stop-color" values="#00D4AA;#10B981;#00D4AA" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#10B981">
        <animate attributeName="stop-color" values="#10B981;#00D4AA;#10B981" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="160" fill="#07090F" rx="12"/>
  <!-- Animated shield -->
  <g transform="translate(100, 80)" filter="url(#glow)">
    <path d="M0,-40 L30,-20 L30,15 Q30,35 0,50 Q-30,35 -30,15 L-30,-20 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="2">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M0,-30 L22,-15 L22,12 Q22,26 0,38 Q-22,26 -22,12 L-22,-15 Z" fill="url(#shieldGrad)" opacity="0.1"/>
    <!-- Lock icon inside shield -->
    <rect x="-8" y="2" width="16" height="14" rx="2" fill="url(#shieldGrad)" opacity="0.8"/>
    <path d="M-5,2 L-5,-3 Q-5,-8 0,-8 Q5,-8 5,-3 L5,2" fill="none" stroke="url(#shieldGrad)" stroke-width="1.5" opacity="0.8"/>
    <circle cx="0" cy="8" r="2" fill="#07090F"/>
    <rect x="-1" y="9" width="2" height="4" rx="1" fill="#07090F"/>
  </g>
  <!-- Feature callouts -->
  <text x="200" y="50" fill="#00D4AA" font-family="monospace" font-size="10" opacity="0.9">AES-256-GCM Encryption</text>
  <text x="200" y="70" fill="#94A3B8" font-family="sans-serif" font-size="12">Military-grade authenticated encryption</text>
  <text x="200" y="95" fill="#58A6FF" font-family="monospace" font-size="10" opacity="0.9">Double Ratchet Protocol</text>
  <text x="200" y="115" fill="#94A3B8" font-family="sans-serif" font-size="12">Forward secrecy · Break-in recovery</text>
  <text x="200" y="140" fill="#BC8CFF" font-family="monospace" font-size="10" opacity="0.9">Zero-Knowledge Architecture</text>
  <text x="500" y="50" fill="#94A3B8" font-family="sans-serif" font-size="12">No server can read your messages</text>
  <text x="500" y="70" fill="#FFA657" font-family="monospace" font-size="10" opacity="0.9">No Phone Number Required</text>
  <text x="500" y="90" fill="#94A3B8" font-family="sans-serif" font-size="12">Identity-free messaging via SimpleX</text>
  <text x="500" y="115" fill="#22C55E" font-family="monospace" font-size="10" opacity="0.9">100% Offline &amp; Local</text>
  <text x="500" y="135" fill="#94A3B8" font-family="sans-serif" font-size="12">Your data never leaves your device</text>
  <!-- Divider line -->
  <line x1="460" y1="30" x2="460" y2="135" stroke="#1E2A3A" stroke-width="1"/>
</svg>
