<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="aetherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1">
        <animate attributeName="stop-color" values="#00D4AA;#58A6FF;#BC8CFF;#00D4AA" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#58A6FF;stop-opacity:1">
        <animate attributeName="stop-color" values="#58A6FF;#BC8CFF;#00D4AA;#58A6FF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#BC8CFF;stop-opacity:1">
        <animate attributeName="stop-color" values="#BC8CFF;#00D4AA;#58A6FF;#BC8CFF" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="200" fill="#0D1117" rx="12"/>
  <!-- Animated brain/circuit -->
  <g transform="translate(60, 100)" filter="url(#glow)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#aetherGrad)" stroke-width="2">
      <animate attributeName="r" values="38;42;38" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="25" fill="none" stroke="url(#aetherGrad)" stroke-width="1.5" opacity="0.5">
      <animate attributeName="r" values="23;27;23" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Neural nodes -->
    <circle cx="-30" cy="-20" r="4" fill="#00D4AA">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="-20" r="4" fill="#58A6FF">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-30" cy="20" r="4" fill="#BC8CFF">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="20" r="4" fill="#00D4AA">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <line x1="-30" y1="-20" x2="30" y2="-20" stroke="#58A6FF" stroke-width="0.5" opacity="0.4"/>
    <line x1="-30" y1="20" x2="30" y2="20" stroke="#BC8CFF" stroke-width="0.5" opacity="0.4"/>
    <line x1="-30" y1="-20" x2="-30" y2="20" stroke="#00D4AA" stroke-width="0.5" opacity="0.4"/>
    <line x1="30" y1="-20" x2="30" y2="20" stroke="#58A6FF" stroke-width="0.5" opacity="0.4"/>
  </g>
  <!-- Tier labels -->
  <text x="160" y="60" fill="#00D4AA" font-family="monospace" font-size="11" opacity="0.8">⚡ TURBO</text>
  <text x="160" y="85" fill="#58A6FF" font-family="monospace" font-size="11" opacity="0.8">🤖 AGENT</text>
  <text x="160" y="110" fill="#BC8CFF" font-family="monospace" font-size="11" opacity="0.8">💻 CODE</text>
  <text x="160" y="135" fill="#FFA657" font-family="monospace" font-size="11" opacity="0.8">🧠 LOGIC</text>
  <!-- Connection lines -->
  <line x1="100" y1="80" x2="155" y2="60" stroke="#00D4AA" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="90" x2="155" y2="85" stroke="#58A6FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="105" x2="155" y2="110" stroke="#BC8CFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="120" x2="155" y2="135" stroke="#FFA657" stroke-width="0.5" opacity="0.3"/>
  <!-- Right side: terminal mockup -->
  <rect x="300" y="30" width="470" height="140" rx="8" fill="#161B27" stroke="#2A3145" stroke-width="1"/>
  <rect x="300" y="30" width="470" height="22" rx="8" fill="#1C2333"/>
  <circle cx="314" cy="41" r="5" fill="#FF5F57"/>
  <circle cx="330" cy="41" r="5" fill="#FEBC2E"/>
  <circle cx="346" cy="41" r="5" fill="#28C840"/>
  <text x="535" y="45" fill="#8B93A8" font-family="monospace" font-size="9" text-anchor="middle">Aether Neural Interface</text>
  <text x="320" y="72" fill="#58A6FF" font-family="monospace" font-size="11">  ╔══════════════════════════════════════╗</text>
  <text x="320" y="88" fill="#58A6FF" font-family="monospace" font-size="11">  ║  🌌  A E T H E R  🌌                ║</text>
  <text x="320" y="104" fill="#8B93A8" font-family="monospace" font-size="10">  ║  NEURAL INTERFACE // V 18.0          ║</text>
  <text x="320" y="120" fill="#58A6FF" font-family="monospace" font-size="11">  ╚══════════════════════════════════════╝</text>
  <text x="320" y="144" fill="#00D4AA" font-family="monospace" font-size="10">  🔋 78%  •  💾 42G  •  🧠 VAULT: ACTIVE</text>
  <!-- Cursor blink -->
  <rect x="320" y="158" width="7" height="12" fill="#E8EAF0">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
